<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    {% load static %}
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link rel="stylesheet" href="{% static 'css/page1.css' %}">
    <title>Page1</title>
  </head>
  <body>
    <nav class="navbar">
        <div class="navbar-brand">Logged in: Riya</div>
        <ul class="navbar-links">
          <li><a href="{% url 'dpi-directory' %}">DPI Directory</a></li>
          <li><img src="{% static 'images/user_icon.png' %}" alt="User Icon"></li>
        </ul>
    </nav>

    <div class="hero-container">
        <div class="new-locker">
          <h3>My Lockers</h3>
          <button id="newLockerBtn" class="btn btn-primary">Create New Locker</button>
        </div>
        
        <div id="lockerList">
          <div class="locker-box">
            <h4>Docs</h4>
            <button id="docsBtn" class="openBtn btn btn-secondary">Open</button>
          </div>
          <div class="locker-box">
            <h4>Education</h4>
            <button id="educationBtn" class="openBtn btn btn-secondary">Open</button>
          </div>
          <!-- New lockers will be appended here -->
        </div>
     </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
    <script>
        document.addEventListener('DOMContentLoaded', (event) => {
            const newLockerBtn = document.getElementById('newLockerBtn');
            newLockerBtn.addEventListener('click', () => {
                let lockerName = prompt("Enter the name of new locker");
                if (lockerName) {
                    fetch('/create-locker/', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'X-CSRFToken': getCookie('csrftoken')
                        },
                        body: JSON.stringify({ name: lockerName })
                    })
                    .then(response => response.json())
                    .then(data => {
                        if (data.success) {
                            alert(`New Locker '${lockerName}' created!`);
                            // Add the new locker to the list
                            const lockerList = document.getElementById('lockerList');
                            const newLocker = document.createElement('div');
                            newLocker.classList.add('locker-box');
                            newLocker.innerHTML = `<h4>${data.name}</h4><button class="openBtn btn btn-secondary">Open</button>`;
                            lockerList.appendChild(newLocker);
                        } else {
                            alert('Error creating locker');
                        }
                    })
                    .catch(error => {
                        console.error('Error:', error);
                        alert('Error creating locker');
                    });
                }
            });
        });

        function getCookie(name) {
            let cookieValue = null;
            if (document.cookie && document.cookie !== '') {
                const cookies = document.cookie.split(';');
                for (let i = 0; i < cookies.length; i++) {
                    const cookie = cookies[i].trim();
                    if (cookie.substring(0, name.length + 1) === (name + '=')) {
                        cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                        break;
                    }
                }
            }
            return cookieValue;
        }
    </script>
  </body>
</html>
