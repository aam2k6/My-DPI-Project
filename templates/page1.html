<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    {% load static %}
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link rel="stylesheet" href="{% static 'css/page1.css' %}">
    <title>Page1</title>
</head>
<body>
    <nav class="navbar">
        <div class="navbar-brand">Logged in: Riya</div>
        <ul class="navbar-links">
            <li><a href="{% url 'dpi-directory' %}">DPI Directory</a></li>
            <li><img src="{% static 'images/user_icon.png' %}" alt="User Icon"></li>
        </ul>
    </nav>

    <div class="hero-container">
        <div class="new-locker">
            <h3>My Lockers</h3>
            <button id="newLockerBtn" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#newLockerModal">Create New Locker</button>
        </div>
        
        <div id="lockerList">
            {% for locker in lockers %}
            <div class="locker-box">
                <h4>{{ locker.name }}</h4>
                <p>Description: {{ locker.description }}</p>
                <p>Creation Date: {{ locker.creation_date }}</p>
                <a href="{% url 'sharing-page' %}" class="openBtn btn btn-secondary">Open</a>
            </div>
            {% endfor %}
            <!-- New lockers will be appended here -->
        </div>
    </div>

    <!-- New Locker Modal -->
    <div class="modal fade" id="newLockerModal" tabindex="-1" aria-labelledby="newLockerModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="newLockerModalLabel">Create New Locker</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="newLockerForm">
                        <div class="mb-3">
                            <label for="lockerName" class="form-label">Locker Name</label>
                            <input type="text" class="form-control" id="lockerName" required>
                        </div>
                        <div class="mb-3">
                            <label for="lockerDescription" class="form-label">Description</label>
                            <textarea class="form-control" id="lockerDescription" rows="3" required></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary">Create</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Success Modal -->
    <div class="modal fade" id="successModal" tabindex="-1" aria-labelledby="successModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="successModalLabel">Success</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    New Locker created successfully!
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
    <script>
        document.addEventListener('DOMContentLoaded', (event) => {
            const newLockerForm = document.getElementById('newLockerForm');

            newLockerForm.addEventListener('submit', (e) => {
                e.preventDefault();

                let lockerName = document.getElementById('lockerName').value;
                let lockerDescription = document.getElementById('lockerDescription').value;

                if (lockerName && lockerDescription) {
                    fetch('/create-locker/', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'X-CSRFToken': getCookie('csrftoken')
                        },
                        body: JSON.stringify({ name: lockerName, description: lockerDescription })
                    })
                    .then(response => {
                        if (!response.ok) {
                            throw new Error('Network response was not ok ' + response.statusText);
                        }
                        return response.json();
                    })
                    .then(data => {
                        if (data.success) {
                            const lockerList = document.getElementById('lockerList');
                            const newLocker = document.createElement('div');
                            newLocker.classList.add('locker-box');
                            newLocker.innerHTML = `
                                <h4>${data.name}</h4>
                                <p>Description: ${data.description}</p>
                                <p>Creation Date: ${data.creation_date}</p>
                                <a href="{% url 'sharing-page' %}" class="openBtn btn btn-secondary">Open</a>
                            `;
                            lockerList.appendChild(newLocker);

                            const openBtn = newLocker.querySelector('.openBtn');
                            openBtn.addEventListener('click', redirectToEducation);

                            // Reset the form and close the modal
                            newLockerForm.reset();
                            var modal = bootstrap.Modal.getInstance(document.getElementById('newLockerModal'));
                            modal.hide();

                            // Show success modal
                            var successModal = new bootstrap.Modal(document.getElementById('successModal'));
                            successModal.show();
                        } else {
                            alert('Error creating locker: ' + data.error);
                        }
                    })
                    .catch(error => {
                        console.error('Error:', error);
                        alert('Error creating locker');
                    });
                } else {
                    alert('Locker name and description are required.');
                }
            });
        });

        function getCookie(name) {
            let cookieValue = null;
            if (document.cookie && document.cookie !== '') {
                const cookies = document.cookie.split(';');
                for (let i = 0; i < cookies.length; i++) {
                    const cookie = cookies[i].trim();
                    if (cookie.substring(0, name.length + 1) === (name + '=')) {
                        cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                        break;
                    }
                }
            }
            return cookieValue;
        }

        // Function to redirect to education sharing page
        function redirectToEducation() {
            window.location.href = '../Page2/sharingpage.html';
        }
    </script>
</body>
</html>
