<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    {% load static %}
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link rel="stylesheet" href="{% static 'css/page3.css' %}">
    <title>Page3</title>
</head>
<body>
    <nav class="navbar">
        <div class="navbar-brand">DPI Directory</div>
        <ul class="navbar-links">
            <li><a href="{% url 'dpi-directory' %}">Home</a></li>
            <li><img src="{% static 'images/user_icon.png' %}" alt="User Icon"></li>
        </ul>
    </nav>

    <div class="hero-container">
        <div class="search">
            <form id="search-form">
                <div class="input-group mb-3">
                    <input type="text" class="form-control" id="search-input" placeholder="Enter user" name="search">
                    <button class="btn btn-outline-secondary" type="submit" id="search-button">Search</button>
                </div>
                <p>Select Tags: Tag1, Tag2</p>
            </form>
        </div>
        <div class="container" id="users-container">
            {% for user in users %}
                <div class="card">
                    <h4>{{ user.username }}</h4>
                    <button class="enter-btn" data-userid="{{ user.id }}">Enter</button>
                </div>
            {% empty %}
                <p>No users found.</p>
            {% endfor %}
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
